<style>
:root {
  --bg: #050914; --bg2: #080d1a; --glass: rgba(255,255,255,0.025);
  --glass-hover: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.06);
  --border-glow: rgba(255,255,255,0.1); --text: #E8ECF1; --text2: #C8CDD6;
  --muted: #7B8496; --dim: #4A5266;
  --violet: #6C5CE7; --violet-g: rgba(108,92,231,0.35);
  --cyan: #00D2FF; --cyan-g: rgba(0,210,255,0.3);
  --gold: #FFD93D; --gold-g: rgba(255,217,61,0.3);
  --green: #00E676; --coral: #FF6B6B;
  --grad: linear-gradient(135deg, #6C5CE7, #00D2FF);
  --grad-full: linear-gradient(135deg, #6C5CE7, #00D2FF, #FFD93D);
  --font: 'Inter', sans-serif;
  --font-display: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --r-sm: 8px; --r-md: 14px; --r-lg: 22px; --r-xl: 32px; --r-full: 9999px;
  --mw: 1280px; --t-fast: 0.2s cubic-bezier(.4,0,.2,1);
  --t-med: 0.4s cubic-bezier(.4,0,.2,1); --t-slow: 0.7s cubic-bezier(.4,0,.2,1);
}

/* ── Light mode ── */
[data-theme="light"] {
  --bg: #FAF8F5; --bg2: #F0EDE8;
  --glass: rgba(0,0,0,0.025); --glass-hover: rgba(0,0,0,0.05);
  --border: rgba(0,0,0,0.08); --border-glow: rgba(0,0,0,0.12);
  --text: #1A1A2E; --text2: #2D2D44;
  --muted: #6B7280; --dim: #9CA3AF;
  --violet: #5B4CC4; --violet-g: rgba(91,76,196,0.3);
  --cyan: #0088B4; --cyan-g: rgba(0,136,180,0.25);
  --gold: #B8860B; --gold-g: rgba(184,134,11,0.25);
  --green: #059669; --coral: #DC2626;
  --grad: linear-gradient(135deg, #5B4CC4, #0088B4);
  --grad-full: linear-gradient(135deg, #5B4CC4, #0088B4, #B8860B);
}
[data-theme="light"] .hero-grid-overlay{opacity:.06}
[data-theme="light"] .nav.scrolled{background:rgba(250,248,245,.88)}
[data-theme="light"] .nav-links{background:rgba(250,248,245,.97)!important}
[data-theme="light"] .btn-primary{color:#fff}
[data-theme="light"] .cursor{mix-blend-mode:normal;border-color:var(--violet)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto;scrollbar-width:thin;scrollbar-color:var(--dim) transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none;transition:background .5s ease,color .5s ease}
::selection{background:var(--violet-g);color:var(--text)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:var(--r-full)}
a,button,input,textarea{cursor:none}
@media(hover:none){body,a,button,input,textarea{cursor:auto}}

/* ── Custom Cursor ── */
.cursor{position:fixed;width:20px;height:20px;border:2px solid var(--violet);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s,background .3s;mix-blend-mode:difference}
.cursor-dot{position:fixed;width:4px;height:4px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}
.cursor.hover{width:56px;height:56px;background:rgba(108,92,231,.15);border-color:var(--cyan);mix-blend-mode:normal}
.cursor.click{width:40px;height:40px;background:rgba(0,210,255,.25);border-color:var(--gold)}

/* ── Loading Screen ── */
.loader{position:fixed;inset:0;z-index:100000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s,visibility .6s}
.loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-ring{width:60px;height:60px;border-radius:50%;position:relative}
.loader-ring::before{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--violet);border-right-color:var(--cyan);animation:loader-spin .8s linear infinite}
@keyframes loader-spin{to{transform:rotate(360deg)}}
.loader-text{font-family:var(--font-mono);font-size:.7rem;letter-spacing:4px;color:var(--muted);margin-top:1.5rem;text-transform:uppercase}
.loader-particles{position:absolute;inset:0;pointer-events:none}
.loader-particle{position:absolute;width:2px;height:2px;background:var(--violet);border-radius:50%;animation:loader-burst 1.5s ease-out forwards;opacity:0}
@keyframes loader-burst{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--lx),var(--ly)) scale(0)}}

/* ── 3D Canvas ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── Scroll Progress ── */
.scroll-bar{position:fixed;top:0;left:0;height:3px;background:var(--grad-full);z-index:99998;border-radius:0 2px 0 0;width:0%;transition:width .05s linear}
.scroll-pct{position:fixed;bottom:2rem;right:2rem;font-family:var(--font-mono);font-size:.7rem;color:var(--muted);z-index:99998;opacity:.6}

/* ── Navigation ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:99997;padding:1.2rem 2rem;transition:all var(--t-med)}
.nav.scrolled{background:rgba(5,9,20,.85);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:var(--mw);margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-.5px;display:flex;align-items:center;gap:.4rem}
.nav-logo .dot{width:5px;height:5px;border-radius:50%;background:var(--violet);animation:nav-pulse 2s infinite}@keyframes nav-pulse{0%,100%{box-shadow:0 0 8px var(--violet-g)}50%{box-shadow:0 0 2px var(--violet-g)}}
.nav-links{display:flex;align-items:center;gap:2rem}
.nav-link{color:var(--muted);text-decoration:none;font-size:.82rem;font-weight:500;letter-spacing:.3px;transition:color var(--t-fast);position:relative}
.nav-link::after{content:'';position:absolute;bottom:-5px;left:0;width:0;height:1.5px;background:var(--grad);border-radius:1px;transition:width var(--t-med)}
.nav-link:hover,.nav-link.active{color:var(--text)}.nav-link:hover::after,.nav-link.active::after{width:100%}
.nav-cta{padding:.5rem 1.3rem;border-radius:var(--r-full);background:var(--grad);color:#fff;text-decoration:none;font-size:.78rem;font-weight:600;transition:all var(--t-med);display:flex;align-items:center;gap:.4rem}
.nav-cta:hover{transform:translateY(-1px);box-shadow:0 8px 25px var(--violet-g)}

/* ── Hamburger (mobile) ── */
.nav-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:8px;z-index:99998}
.nav-hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:1px;transition:all var(--t-med)}
.nav-hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.nav-hamburger.active span:nth-child(2){opacity:0}
.nav-hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* ── Theme toggle ── */
.theme-toggle{background:none;border:1px solid var(--border);border-radius:var(--r-full);width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem;cursor:none;transition:all var(--t-med);position:relative;overflow:hidden;margin-right:.5rem}
.theme-toggle:hover{border-color:var(--gold);color:var(--gold)}
.theme-toggle i{position:absolute;transition:all var(--t-med)}
.theme-toggle .fa-sun{opacity:1;transform:translateY(0) rotate(0)}
.theme-toggle .fa-moon{opacity:0;transform:translateY(20px) rotate(90deg)}
[data-theme="light"] .theme-toggle .fa-sun{opacity:0;transform:translateY(-20px) rotate(-90deg)}
[data-theme="light"] .theme-toggle .fa-moon{opacity:1;transform:translateY(0) rotate(0)}

/* ── Sections ── */
.section{position:relative;padding:6rem 1.5rem;z-index:2}
.section-alt{background:var(--bg2)}
.container{max-width:var(--mw);margin:0 auto}
.section-header{text-align:center;margin-bottom:3.5rem}
.section-eyebrow{font-family:var(--font-mono);font-size:.65rem;font-weight:600;letter-spacing:4px;color:var(--violet);text-transform:uppercase;margin-bottom:.8rem;display:inline-block}
.section-eyebrow .scramble{display:inline-block}
.section-title{font-family:var(--font-display);font-size:clamp(2.2rem,5vw,4rem);font-weight:800;line-height:1.1;letter-spacing:-1.5px;margin-bottom:1rem}
.section-title .hl{background:var(--grad-full);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.section-rule{width:60px;height:3px;border-radius:2px;background:var(--grad);margin:0 auto}
.section-desc{max-width:560px;margin:1.3rem auto 0;color:var(--muted);font-size:.95rem;line-height:1.7}

/* ── Hero ── */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6rem 1.5rem 4rem;position:relative;z-index:2}
.hero-grid-overlay{position:absolute;inset:0;opacity:.03;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:50px 50px}
.hero-content{width:100%;max-width:var(--mw);position:relative;z-index:1}
.hero-layout{display:grid;grid-template-columns:1.4fr 1fr;gap:3rem;align-items:center}
@media(max-width:768px){.hero-layout{grid-template-columns:1fr;text-align:center}.hero-visual{order:-1}}
.hero-text-col{display:flex;flex-direction:column;gap:1.4rem}
.hero-chip{display:inline-flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--cyan);font-family:var(--font-mono);padding:.4rem 1rem;border-radius:var(--r-full);border:1px solid rgba(0,210,255,.2);background:rgba(0,210,255,.05);width:fit-content;letter-spacing:.5px;animation:chip-glow 3s ease-in-out infinite}
@keyframes chip-glow{0%,100%{box-shadow:0 0 12px rgba(0,210,255,.1)}50%{box-shadow:0 0 20px rgba(0,210,255,.2)}}
.hero-chip .pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:nav-pulse 2s infinite}
.hero-title{font-family:var(--font-display);font-size:clamp(3rem,7vw,5.5rem);font-weight:800;line-height:1.05;letter-spacing:-2px}
.hero-title .w1,.hero-title .w2,.hero-title .w3{display:block}
.hero-title .w1{color:var(--text)}.hero-title .w2{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.hero-title .w3{color:var(--gold)}
.hero-sub{font-size:clamp(.95rem,1.5vw,1.1rem);color:var(--muted);line-height:1.7;max-width:500px}
.hero-sub strong{color:var(--text);font-weight:600}
.hero-tags{display:flex;flex-wrap:wrap;gap:.5rem}
.hero-tag{padding:.35rem .9rem;border-radius:var(--r-full);border:1px solid var(--border);font-size:.75rem;color:var(--text2);font-weight:500;transition:all var(--t-med);background:var(--glass)}
.hero-tag:hover{border-color:var(--violet);color:var(--violet);transform:translateY(-2px);background:var(--glass-hover)}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap}
.btn-primary,.btn-outline,.btn-ghost{padding:.7rem 1.7rem;border-radius:var(--r-full);text-decoration:none;font-weight:600;font-size:.88rem;display:inline-flex;align-items:center;gap:.5rem;position:relative;overflow:hidden;transition:all var(--t-med)}
.btn-primary{background:var(--grad);color:#fff;border:none}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 35px var(--violet-g)}
.btn-outline{border:1.5px solid var(--border-glow);color:var(--text);background:transparent}.btn-outline:hover{border-color:var(--cyan);color:var(--cyan);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,210,255,.1)}
.hero-socials{display:flex;gap:.7rem}.hero-social{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);text-decoration:none;font-size:1rem;transition:all var(--t-med);background:var(--glass)}
.hero-social:hover{border-color:var(--violet);color:var(--violet);transform:translateY(-3px);box-shadow:0 8px 20px var(--violet-g)}
.hero-visual{display:flex;align-items:center;justify-content:center;position:relative}
.hero-orb{width:260px;height:260px;border-radius:50%;position:relative}
.hero-orb-ring{position:absolute;inset:-15px;border-radius:50%;border:1.5px solid rgba(108,92,231,.2);animation:orb-rotate 20s linear infinite}
@keyframes orb-rotate{to{transform:rotate(360deg)}}
.hero-orb-ring:nth-child(2){inset:-30px;border-color:rgba(0,210,255,.15);animation-duration:25s;animation-direction:reverse}
.hero-orb-ring:nth-child(3){inset:-45px;border-color:rgba(255,217,61,.1);animation-duration:30s}
.hero-orb-inner{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 40% 40%,var(--violet-g),transparent 70%),radial-gradient(circle at 60% 60%,var(--cyan-g),transparent 70%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 80px var(--violet-g),0 0 160px rgba(0,210,255,.2)}
.hero-orb-icon{font-size:3.5rem;background:var(--grad-full);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:orb-float 4s ease-in-out infinite}
@keyframes orb-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── Dividers ── */
.divider{position:relative;height:180px;overflow:hidden;z-index:1;display:flex;align-items:center;justify-content:center}
.divider canvas{width:100%;height:100%}
.divider-label{position:absolute;font-family:var(--font-mono);font-size:.6rem;letter-spacing:5px;color:var(--dim);text-transform:uppercase;z-index:2;opacity:.5}

/* ── Cards ── */
.cards-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.5rem}
.cards-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
.glass-card{padding:2rem;border-radius:var(--r-lg);border:1px solid var(--border);background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all var(--t-med);position:relative;overflow:hidden}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--grad);opacity:0;transition:opacity var(--t-med)}
.glass-card:hover::before{opacity:1}
.glass-card:hover{background:var(--glass-hover);border-color:var(--border-glow);transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 0 1px rgba(108,92,231,.1)}

.card-icon{font-size:2rem;margin-bottom:1rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card-title{font-family:var(--font-display);font-size:1.15rem;font-weight:700;color:var(--text);margin-bottom:.4rem}
.card-sub{font-family:var(--font-mono);font-size:.7rem;color:var(--violet);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.5rem}
.card-desc{color:var(--muted);font-size:.85rem;line-height:1.7;margin-bottom:1rem}
.card-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.card-tag{padding:.22rem .6rem;border-radius:var(--r-full);background:rgba(108,92,231,.12);color:var(--violet);font-size:.68rem;font-weight:500}

/* ── Experience cards ── */
.exp-card{display:flex;gap:1.5rem;align-items:flex-start;padding:2rem;border-radius:var(--r-lg);border:1px solid var(--border);background:var(--glass);transition:all var(--t-med)}
.exp-card:hover{background:var(--glass-hover);border-color:var(--border-glow);transform:translateX(4px)}
@media(max-width:500px){.exp-card{flex-direction:column}}
.exp-icon-box{flex-shrink:0;width:50px;height:50px;border-radius:var(--r-md);background:rgba(108,92,231,.1);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--violet)}
.exp-body{flex:1}
.exp-org{font-family:var(--font-mono);font-size:.7rem;color:var(--cyan);letter-spacing:1px;text-transform:uppercase;margin-bottom:.25rem}
.exp-role{font-family:var(--font-display);font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:.2rem}
.exp-date{font-size:.75rem;color:var(--dim);margin-bottom:.7rem}
.exp-desc{color:var(--muted);font-size:.85rem;line-height:1.7}

/* ── Education stats ── */
.edu-highlight{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-top:1rem}
.edu-stat{text-align:center;padding:.8rem;border-radius:var(--r-md);background:rgba(108,92,231,.05);border:1px solid var(--border)}
.edu-stat-val{font-family:var(--font-display);font-size:1.3rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.edu-stat-lbl{font-size:.65rem;color:var(--muted);margin-top:.15rem;text-transform:uppercase;letter-spacing:.5px}

/* ── Finance ticker ── */
.ticker-wrap{overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:.6rem 0;margin-bottom:2.5rem;position:relative}
.ticker-track{display:flex;gap:3rem;animation:ticker-scroll 30s linear infinite;width:max-content}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:flex;align-items:center;gap:.6rem;font-family:var(--font-mono);font-size:.72rem;white-space:nowrap}
.ticker-symbol{color:var(--text);font-weight:600}.ticker-price{color:var(--cyan)}.ticker-change{font-weight:500}.ticker-up{color:var(--green)}.ticker-down{color:var(--coral)}

/* ── Projects ── */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
.project-card{border-radius:var(--r-lg);border:1px solid var(--border);background:var(--glass);overflow:hidden;transition:all var(--t-med)}
.project-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.5);border-color:var(--border-glow)}
.project-media{height:170px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden}
.project-media i{color:var(--violet);transition:all var(--t-med);z-index:1}
.project-card:hover .project-media i{transform:scale(1.15);color:var(--cyan)}
.project-media::after{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:opacity var(--t-med)}
.project-card:hover .project-media::after{opacity:.06}
.project-body{padding:1.5rem}
.project-cat{font-family:var(--font-mono);font-size:.62rem;color:var(--cyan);text-transform:uppercase;letter-spacing:2px;margin-bottom:.3rem}
.project-title{font-family:var(--font-display);font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:.5rem}
.project-desc{color:var(--muted);font-size:.82rem;line-height:1.6;margin-bottom:1rem}

/* ── Contact ── */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem}@media(max-width:768px){.contact-grid{grid-template-columns:1fr}}
.contact-info{display:flex;flex-direction:column;gap:1rem}
.contact-item{display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem;border-radius:var(--r-md);border:1px solid var(--border);background:var(--glass);transition:all var(--t-med);text-decoration:none}
.contact-item:hover{background:var(--glass-hover);border-color:var(--violet);transform:translateX(6px)}
.contact-item-icon{width:42px;height:42px;border-radius:50%;background:rgba(108,92,231,.1);display:flex;align-items:center;justify-content:center;color:var(--violet);flex-shrink:0;font-size:.9rem}
.contact-item-text .cil{font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}.contact-item-text .civ{color:var(--text);font-weight:500}
.form-group{margin-bottom:1.1rem}.form-group label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.3rem;font-weight:500}
